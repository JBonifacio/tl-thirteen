services:
  app:
    build: .
    restart: unless-stopped
    # Ports exposed only internally - cloudflared handles external access
    expose:
      - "8080"
    depends_on:
      - api
    networks: 
      - default
      - proxy-net


  api:
    build: ./server
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - leaderboard-data:/data
    environment:
      - DB_PATH=/data/leaderboard.db
      - PORT=3001

  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel --config /etc/cloudflared/config.yml run
  #   volumes:
  #     - ./cloudflare-tunnel.yml:/etc/cloudflared/config.yml:ro
  #     - ./cloudflared-credentials.json:/etc/cloudflared/credentials.json:ro
  #   depends_on:
  #     - app

volumes:
  leaderboard-data:

networks:
  proxy-net:
    external: true